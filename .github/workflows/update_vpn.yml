name: Update VPN Configs

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run update script
      run: python update_vpn.py
      
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # Сохраняем изменения, если они есть
        git stash push --include-untracked -m "auto-stash" || echo "Nothing to stash"
        # Забираем последние изменения
        git pull --rebase
        # Восстанавливаем изменения
        git stash pop || echo "No stash to pop"
        git add docs/
        # Коммитим, если есть изменения
        git diff --staged --quiet || git commit -m "Manual update VPN configs $(date +'%Y-%m-%d %H:%M')"
        # Пушим
        git push --force-with-lease
